<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuclear AI | Admin Dashboard</title>
    <!-- Reusing main typography and styles -->
    <link rel="stylesheet" href="style.css?v=13">
    <link rel="stylesheet" href="dashboard.css?v=2">
    <link rel="stylesheet" href="admin.css?v=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dashboard-body admin-body">
    <div class="dashboard-layout">
        <!-- Left Sidebar: Users List -->
        <aside class="dashboard-sidebar" style="border-right: 1px solid #e5e7eb; flex-shrink: 0;">
            <div class="sidebar-header">
                <img src="NuclearAI.png" alt="Nuclear AI" class="logo-img" style="width: 32px; height: 32px;">
                <div class="sidebar-title">Nuclear Admin<br><span style="color: #ef4444;">Superuser Access</span></div>
            </div>

            <div class="sidebar-search">
                <i data-lucide="search"></i>
                <input type="text" id="user-search" placeholder="Search users...">
            </div>

            <div class="sidebar-nav">
                <div class="nav-group">Registered Users</div>
                <ul id="admin-user-list" class="admin-list">
                    <!-- Users injected here -->
                </ul>
            </div>
            
            <div class="sidebar-footer">
                <button onclick="window.location.href='dashboard.html'" class="btn-primary" style="width: 100%; justify-content: center; background: #111827;">Exit Admin</button>
            </div>
        </aside>

        <!-- Middle Column: Projects List -->
        <aside class="dashboard-sidebar" id="admin-projects-col" style="border-right: 1px solid #e5e7eb; display: none; flex-shrink: 0;">
            <div class="sidebar-header">
                <div class="sidebar-title" style="margin: 0;">User Projects<br><span id="selected-user-email"></span></div>
            </div>
            <div class="sidebar-nav">
                <ul id="admin-project-list" class="admin-list">
                    <!-- Projects injected here -->
                </ul>
            </div>
        </aside>

        <!-- Main Content Area: Project Data Editor -->
        <main class="dashboard-content" id="admin-editor-area" style="display: none; background: #fff;">
            <header class="dash-top-bar" style="border-bottom: 1px solid #e5e7eb;">
                <div class="dash-filters">
                    <h3 id="editing-project-name" style="margin: 0;">Editing Project</h3>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button class="btn-primary" onclick="saveProjectData()"><i data-lucide="save"></i> Save Changes</button>
                </div>
            </header>

            <div class="dash-main-area admin-editor-tabs" style="padding: 40px; max-width: 900px;">
                <!-- Tabs -->
                <div class="auth-tabs" style="margin-bottom: 32px; display: flex; gap: 8px;">
                    <button class="auth-tab active" onclick="switchAdminTab('overview')">Overview</button>
                    <button class="auth-tab" onclick="switchAdminTab('prompts')">Prompts</button>
                    <button class="auth-tab" onclick="switchAdminTab('sources')">Sources</button>
                    <button class="auth-tab" onclick="switchAdminTab('models')">Models</button>
                    <button class="auth-tab" onclick="switchAdminTab('comply')">Comply</button>
                </div>

                <div class="editor-content-area">
                    <!-- Overview Tab Editor -->
                    <div id="tab-overview" class="admin-tab-content">
                        <div class="admin-editor-grid">
                            <div class="admin-form-col">
                                <label class="form-label">Update Message</label>
                                <textarea id="overview-msg" class="admin-textarea" placeholder="What's the latest update?"></textarea>
                                
                                <label class="form-label" style="margin-top: 16px;">Status Light</label>
                                <select id="overview-color" class="admin-input">
                                    <option value="green">Green (Healthy)</option>
                                    <option value="yellow">Yellow (Progressing)</option>
                                    <option value="orange">Orange (Action Required)</option>
                                </select>
                            </div>
                            <div class="admin-history-col">
                                <label class="form-label">Previous Updates</label>
                                <div id="history-overview" class="history-list"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Prompts Tab Editor -->
                    <div id="tab-prompts" class="admin-tab-content" style="display: none;">
                        <div class="admin-editor-grid">
                            <div class="admin-form-col">
                                <label class="form-label">Package Title</label>
                                <input type="text" id="prompts-title" class="admin-input" placeholder="e.g., V1 Core Prompts">
                                
                                <label class="form-label" style="margin-top: 16px;">Description</label>
                                <textarea id="prompts-desc" class="admin-textarea" placeholder="Detailed documentation..."></textarea>
                                
                                <label class="form-label" style="margin-top: 16px;">Attach Files (comma separated names)</label>
                                <input type="text" id="prompts-files" class="admin-input" placeholder="index.js, styles.css, README.md">
                            </div>
                            <div class="admin-history-col">
                                <label class="form-label">Existing Packages</label>
                                <div id="history-prompts" class="history-list"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Sources Tab Editor -->
                    <div id="tab-sources" class="admin-tab-content" style="display: none;">
                        <div class="admin-editor-grid">
                            <div class="admin-form-col">
                                <label class="form-label">Sources Documentation</label>
                                <textarea id="sources-content" class="admin-textarea" style="height: 200px;" placeholder="Paste tool documentation here..."></textarea>
                            </div>
                            <div class="admin-history-col">
                                <label class="form-label">History</label>
                                <div id="history-sources" class="history-list"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Models Tab Editor -->
                    <div id="tab-models" class="admin-tab-content" style="display: none;">
                        <div class="admin-editor-grid">
                            <div class="admin-form-col">
                                <label class="form-label">Project Model Details</label>
                                <textarea id="models-content" class="admin-textarea" style="height: 200px;" placeholder="Full project architecture details..."></textarea>
                            </div>
                            <div class="admin-history-col">
                                <label class="form-label">History</label>
                                <div id="history-models" class="history-list"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Comply Tab Editor -->
                    <div id="tab-comply" class="admin-tab-content" style="display: none;">
                        <div class="admin-editor-grid">
                            <div class="admin-form-col">
                                <label class="form-label">Message to Team</label>
                                <textarea id="comply-content" class="admin-textarea" style="height: 200px;" placeholder="Compliance notes or team messages..."></textarea>
                            </div>
                            <div class="admin-history-col">
                                <label class="form-label">Sent Messages</label>
                                <div id="history-comply" class="history-list"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        
        <!-- Empty State when nothing selected -->
        <main class="dashboard-content" id="admin-empty-area" style="display: flex; align-items: center; justify-content: center; background: #f9fafb;">
            <div class="empty-state">
                <div class="empty-icon"><i data-lucide="shield-check"></i></div>
                <h3>Admin Access</h3>
                <p>Select a user and a project from the sidebar to begin editing their dashboard data.</p>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="admin.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
